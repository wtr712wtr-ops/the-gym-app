<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="THE GYM">
<title>THE GYM</title>
<link rel="manifest" href="/manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--border:#2a2a2a;--text:#f0f0f0;--text2:#888;--green:#4ade80;--line:#06C755}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto}
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;gap:40px}
.logo{font-size:42px;font-weight:900;letter-spacing:-2px;text-align:center}
.sub{font-size:11px;letter-spacing:4px;color:var(--text2);margin-top:8px;text-align:center}
.card{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px 24px;display:flex;flex-direction:column;gap:16px}
.card-title{font-size:18px;font-weight:700}
.card-desc{font-size:13px;color:var(--text2);line-height:1.6}
.btn-line{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--line);color:white;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;width:100%}
#app{display:none;flex-direction:column;min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.hlogo{font-size:20px;font-weight:900;letter-spacing:-1px}
.av{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.main{flex:1;padding:0 0 80px}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px))}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;color:var(--text2);cursor:pointer;font-size:10px;font-weight:600;border:none;background:none}
.ni.on{color:var(--text)}
.ni svg{width:22px;height:22px}
.pg{display:none;padding:20px}
.pg.on{display:block}
.gname{font-size:22px;font-weight:800}
.gsub{font-size:13px;color:var(--text2);margin-top:4px;margin-bottom:24px}
.stitle{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text2);text-transform:uppercase;margin-bottom:12px}
.srow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px}
.snum{font-size:28px;font-weight:900}
.slabel{font-size:11px;color:var(--text2);margin-top:4px}
.rc{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;cursor:pointer}
.rdate{font-size:11px;color:var(--text2);margin-bottom:8px}
.rtitle{font-size:16px;font-weight:700;margin-bottom:8px}
.rtags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;background:var(--bg3);color:var(--text2);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
.tag.hl{color:var(--green);border-color:var(--green)}
.lbtn{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--line);color:white;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:12px}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.ei{font-size:48px;margin-bottom:16px}
.et{font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px}
.ed{font-size:13px;line-height:1.6}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:flex-end}
.ov.on{display:flex}
.sh{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px}
.hd{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.stit{font-size:20px;font-weight:800;margin-bottom:4px}
.sdat{font-size:12px;color:var(--text2);margin-bottom:20px}
.ei2{background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:10px}
.en{font-size:14px;font-weight:700;margin-bottom:8px}
.es{display:flex;gap:8px;flex-wrap:wrap}
.ec{font-size:12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;color:var(--text2)}
.cb{background:var(--bg3);border-radius:12px;padding:14px;margin-top:16px}
.cl{font-size:11px;color:var(--text2);margin-bottom:6px;letter-spacing:1px}
.ct{font-size:14px;line-height:1.7}
.cls{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px}
.ph{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.pa{width:64px;height:64px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.pa img{width:100%;height:100%;object-fit:cover}
.pn{font-size:20px;font-weight:800}
.pi{font-size:12px;color:var(--text2);margin-top:4px}
.mi{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer}
.ml{display:flex;align-items:center;gap:12px}
.lo{width:100%;background:none;border:1px solid #f44;color:#f44;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px}
.spin{display:flex;align-items:center;justify-content:center;padding:40px}
.sp{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.tr-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.tr-date{font-size:11px;color:var(--text2);margin-bottom:6px}
.tr-ex{font-size:16px;font-weight:700;margin-bottom:10px}
.tr-stats{display:flex;gap:6px;flex-wrap:wrap}
.tr-stat{font-size:12px;background:var(--bg3);border-radius:8px;padding:4px 10px;color:var(--text2)}
.tr-stat span{color:var(--green);font-weight:700}
.tr-note{font-size:13px;color:var(--text2);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);line-height:1.5}
.memo-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;font-size:14px;line-height:1.7;color:var(--text)}
</style>
</head>
<body>
<div id="login">
  <div><div class="logo">THE GYM</div><div class="sub">PERSONAL TRAINING</div></div>
  <div class="card">
    <div class="card-title">Ã¤Â¼ÂÃ¥ÂÂ¡Ã£ÂÂ­Ã£ÂÂ°Ã£ÂÂ¤Ã£ÂÂ³</div>
    <div class="card-desc">LINEÃ£ÂÂ¢Ã£ÂÂ«Ã£ÂÂ¦Ã£ÂÂ³Ã£ÂÂÃ£ÂÂ§Ã£ÂÂ­Ã£ÂÂ°Ã£ÂÂ¤Ã£ÂÂ³Ã£ÂÂÃ£ÂÂ¦Ã£ÂÂÃ£ÂÂ Ã£ÂÂÃ£ÂÂ</div>
    <button class="btn-line" id="loginBtn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
      LINEÃ£ÂÂ§Ã£ÂÂ­Ã£ÂÂ°Ã£ÂÂ¤Ã£ÂÂ³
    </button>
  </div>
</div>
<div id="app">
  <div class="header"><div class="hlogo">THE GYM</div><div class="av" id="av"><span id="avi">?</span></div></div>
  <div class="main">
    <div class="pg on" id="pg-home">
      <div class="gname" id="gname">Hello!</div>
      <div class="gsub" id="gsub">Today's training</div>
      <div class="stitle">トレーニング Stats</div>
      <div class="srow">
        <div class="sc"><div class="snum" id="tot">0</div><div class="slabel">トータルセッション</div></div>
        <div class="sc"><div class="snum" id="mon">0</div><div class="slabel">今月のセッション</div></div>
      </div>
      <div class="stitle">最新のトレーニング</div>
      <div id="latest"><div class="spin"><div class="sp"></div></div></div>
      <button class="lbtn" id="lineBtn">公式LINEへ連絡・予約</button>
    </div>
    <div class="pg" id="pg-records">
      <div class="stitle" style="margin-bottom:16px">トレーニング記録</div>
      <div id="rlist"><div class="spin"><div class="sp"></div></div></div>
      <div class="stitle" style="margin:24px 0 16px">トレーナーメモ</div>
      <div id="memo-list"><div class="spin"><div class="sp"></div></div></div>
    </div>
    <div class="pg" id="pg-profile">
      <div class="ph"><div class="pa" id="pav"><span id="pavi">?</span></div><div><div class="pn" id="pname">-</div><div class="pi" id="pid">-</div></div></div>
      <div class="stitle" style="margin-bottom:12px">メニュー</div>
      <div class="mi" id="lineメニュー"><div class="ml"><span style="font-size:20px">Ã°ÂÂÂ¬</span><span style="font-size:15px;font-weight:600">公式LINEへ</span></div><span style="color:var(--text2)">Ã¢ÂÂº</span></div>
      <button class="lo" id="logoutBtn">ログアウト</button>
    </div>
  </div>
  <nav class="bnav">
    <button class="ni on" id="ni-home" onclick="showPage('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>ホーム</button>
    <button class="ni" id="ni-records" onclick="showPage('records')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>記録</button>
    <button class="ni" id="ni-profile" onclick="showPage('profile')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>マイページ</button>
  </nav>
</div>
<div class="ov" id="ov" onclick="closeD(event)">
  <div class="sh"><div class="hd"></div><div class="stit" id="dtit">-</div><div class="sdat" id="ddat">-</div><div id="dex"></div><div id="dcm"></div><button class="cls" onclick="closeD()">閉じる</button></div>
</div>
<script>
var LINE_URL='https://line.me/R/ti/p/185xayqo';
var user=null;
document.getElementById('loginBtn').addEventListener('click',function(){
  var s=Math.random().toString(36).substr(2);
  location.href='https://access.line.me/oauth2/v2.1/authorize?response_type=code&client_id=2009567758&redirect_uri='+encodeURIComponent(location.origin+'/api/callback')+'&state='+s+'&scope=profile%20openid';
});
document.getElementById('lineBtn').addEventListener('click',function(){window.open(LINE_URL,'_blank');});
document.getElementById('lineメニュー').addEventListener('click',function(){window.open(LINE_URL,'_blank');});
document.getElementById('logoutBtn').addEventListener('click',function(){if(confirm('ログアウトしますか？')){localStorage.removeItem('gym_user');location.reload();}});
function init(){
  var p=new URLSearchParams(location.search);
  if(p.get('user')){try{user=JSON.parse(decodeURIComponent(p.get('user')));localStorage.setItem('gym_user',JSON.stringify(user));history.replaceState({},'','/');}catch(e){}}
  else{var s=localStorage.getItem('gym_user');if(s){try{user=JSON.parse(s);}catch(e){}}}
  if(user){
    if(user.userId==='U0f4c1d79f182f727c49b0b1bfbace466'&&location.pathname.indexOf('admin')===-1){
      location.href='/admin.html';
      return;
    }
    showApp();
    loadData();
  }
  if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(function(){});
}
function showApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  var n=user.displayName||'Guest';
  var h=new Date().getHours();
  var g=h<11?'おはようございます！':h<18?'こんにちは！':'こんばんは！';
  document.getElementById('gname').textContent=n;
  document.getElementById('gsub').textContent=g+'今日も頑張りましょう';
  document.getElementById('avi').textContent=n.charAt(0);
  document.getElementById('pavi').textContent=n.charAt(0);
  document.getElementById('pname').textContent=n;
  document.getElementById('pid').textContent='ID: '+(user.userId||'').substring(0,10)+'...';
  if(user.pictureUrl){document.getElementById('av').innerHTML='<img src="'+user.pictureUrl+'">';document.getElementById('pav').innerHTML='<img src="'+user.pictureUrl+'">';}
}
function loadData(){
  var uid=user.userId||'';
  console.log('[loadData] userId:', uid);
  if(!uid)return;
  var base='/api/memo?clientId='+uid+'&userId='+uid;
  Promise.all([
    fetch(base+'&trainings').then(function(r){return r.json();}),
    fetch(base).then(function(r){return r.json();})
  ]).then(function(results){
    var tr=(results[0].trainings)||[];
    var me=(results[1].memos)||[];
    console.log('[loadData] trainings:', JSON.stringify(tr));
    console.log('[loadData] memos:', JSON.stringify(me));
    renderHome(tr);
    renderTrainings(tr);
    renderMemos(me);
  }).catch(function(e){console.error('[loadData] error:', e);renderHome([]);renderTrainings([]);renderMemos([]);});
}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderHome(trainings){
  document.getElementById('tot').textContent=trainings.length;
  var now=new Date();
  var ym=now.getFullYear()+'/'+(now.getMonth()+1)+'/';
  var mon=trainings.filter(function(t){return t.date&&String(t.date).indexOf(ym)===0;}).length;
  document.getElementById('mon').textContent=mon;
  var c=document.getElementById('latest');
  if(!trainings.length){c.innerHTML='<div class="empty"><div class="ei">&#x1F3CB;&#xFE0F;</div><div class="et">まだ記録がありません</div><div class="ed">トレーニング後に記録が追加されます</div></div>';return;}
  var t=trainings[0];
  var stats=[];
  if(t.weight)stats.push('<span class="tag">'+escH(String(t.weight))+'kg</span>');
  if(t.reps)stats.push('<span class="tag">'+escH(String(t.reps))+'回</span>');
  if(t.sets)stats.push('<span class="tag">'+escH(String(t.sets))+'セット</span>');
  c.innerHTML='<div class="rc"><div class="rdate">'+escH(t.date||'')+'</div><div class="rtitle">'+escH(t.exercise||'トレーニング')+'</div><div class="rtags">'+stats.join('')+'</div></div>';
}
function renderTrainings(list){
  var c=document.getElementById('rlist');
  if(!list.length){c.innerHTML='<div class="empty"><div class="ei">&#x1F3CB;&#xFE0F;</div><div class="et">まだ記録がありません</div><div class="ed">トレーニング後に記録が追加されます</div></div>';return;}
  c.innerHTML=list.map(function(t){
    var stats=[];
    if(t.weight)stats.push('<div class="tr-stat"><span>'+escH(String(t.weight))+'</span> kg</div>');
    if(t.reps)stats.push('<div class="tr-stat"><span>'+escH(String(t.reps))+'</span> 回</div>');
    if(t.sets)stats.push('<div class="tr-stat"><span>'+escH(String(t.sets))+'</span> セット</div>');
    return '<div class="tr-card">'
      +'<div class="tr-date">'+escH(t.date||'')+'</div>'
      +'<div class="tr-ex">'+escH(t.exercise||'')+'</div>'
      +(stats.length?'<div class="tr-stats">'+stats.join('')+'</div>':'')
      +(t.memo?'<div class="tr-note">'+escH(t.memo)+'</div>':'')
      +'</div>';
  }).join('');
}
function renderMemos(list){
  var c=document.getElementById('memo-list');
  if(!list.length){c.innerHTML='<div class="empty" style="padding:20px 0;font-size:13px">まだ記録がありません</div>';return;}
  c.innerHTML=list.map(function(m){return'<div class="memo-card">'+escH(m)+'</div>';}).join('');
}
function closeD(e){if(!e||e.target===document.getElementById('ov'))document.getElementById('ov').classList.remove('on');}
function showPage(n){document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});document.querySelectorAll('.ni').forEach(function(i){i.classList.remove('on');});document.getElementById('pg-'+n).classList.add('on');document.getElementById('ni-'+n).classList.add('on');}
init();
</script>
</body>
</html>
